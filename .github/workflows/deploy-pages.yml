name: Deploy to GitHub Pages

# Builds dist/ from master and publishes it to gh-pages via the same
# `gh-pages -d dist` mechanism as `npm run deploy`, so the branch only
# ever contains build output — never a stray push of the full repo.
on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".env.production"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify build did not bundle mocks
        run: |
          if grep -q "mockServiceWorker" dist/assets/*.js; then
            echo "::error::Production build references mockServiceWorker.js — VITE_USE_MOCK was not disabled." >&2
            exit 1
          fi

      - name: Deploy dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
