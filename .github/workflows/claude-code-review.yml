name: Claude Code Review

on:
  pull_request:
    # Dropped 'synchronize' and 'reopened': every push to a PR branch used to
    # trigger a full-diff review, so rapid pushes burned tokens N times over.
    # Re-review on demand by commenting '@claude review' (handled by claude.yml).
    types: [opened, ready_for_review]
    # Only review actual source changes — config/docs/workflow-only PRs skip review.
    paths:
      - "src/**"
      - "server/src/**"

# Cancel an in-flight review when a newer push/event arrives for the same PR,
# so a burst of commits costs one review (the latest) instead of one per push.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip forks (no secrets) and drafts (still iterating — review when ready).
    if: >
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@0f97b95b6536c26e5f6bd90faec370d41695beca # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Per-run cost caps: bound the agent loop and pin a cost-efficient model
          # for routine review (Haiku 4.5 ~= 75% cheaper than Sonnet). Bump --model
          # to claude-sonnet-4-6 if you want more thorough reviews.
          # NOTE: confirm flag names against the action's docs/usage.md before relying on them.
          claude_args: '--max-turns 15 --model claude-haiku-4-5-20251001'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

